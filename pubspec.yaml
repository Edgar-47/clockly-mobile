name: clockly_mobile
description: "ClockLy mobile app for the workforce clock-in/out SaaS."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Network
  http: ^1.2.2

  # Storage
  flutter_secure_storage: ^9.2.2

  # Connectivity
  connectivity_plus: ^6.1.1

  # External links
  url_launcher: ^6.3.0

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.5

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/brand/
