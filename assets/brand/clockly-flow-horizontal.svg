<?xml version="1.0" encoding="UTF-8"?>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60" role="img" aria-label="ClockLy">
  <title>ClockLy</title>
  <desc>Primary horizontal lockup: Flow icon + wordmark.</desc>
  <g id="icon" transform="translate(0,6)">
    <rect x="4" y="12" width="28" height="10" rx="5" fill="#0A1020"></rect>
    <rect x="16" y="26" width="28" height="10" rx="5" fill="#2F5BFF"></rect>
  </g>
  <g id="wordmark">
    <text x="60" y="40" font-family="Geist, &#39;Geist Sans&#39;, Inter, -apple-system, &#39;Helvetica Neue&#39;, Arial, sans-serif" font-weight="500" font-size="30" letter-spacing="-1.05" fill="#0A1020">ClockLy</text>
  </g>
</svg>